*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:14px/1.45 'Segoe UI',system-ui,sans-serif}
header{padding:12px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;flex-wrap:wrap;background:linear-gradient(180deg,#131924,#0e1117)}
header h1{font-size:16px;margin:0;font-weight:650;letter-spacing:.2px}
header .sub{color:var(--mut);font-size:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand .logo{height:22px;width:auto;display:block}
.brand .bx{color:var(--mut);font-size:13px}
.viewtoggle{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:5px 12px;cursor:pointer;color:var(--mut);font-size:12px}
.chip.on{color:#04120f;background:var(--acc);border-color:var(--acc);font-weight:600}
.chip.reset{border-color:#3a4761}
nav{display:flex;gap:4px;padding:10px 18px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:5}
nav button{background:none;border:none;color:var(--mut);padding:9px 16px;cursor:pointer;font-size:13.5px;border-bottom:2px solid transparent;border-radius:6px 6px 0 0}
nav button.on{color:var(--txt);border-bottom-color:var(--acc);background:var(--panel)}
main{padding:18px 22px;max-width:1560px;margin:0 auto}
.grid{display:grid;gap:16px}
.cols{grid-template-columns:300px 1fr}
@media(max-width:900px){.cols{grid-template-columns:1fr}}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
.panel h3{margin:0 0 12px;font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
.kpi .l{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:22px;font-weight:680;margin-top:5px}
.kpi .v small{font-size:12px;color:var(--mut);font-weight:400}
.kpi .mlt{display:flex;flex-direction:column;gap:8px}
.kpi .mr{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.kpi .ml2{color:var(--mut);font-size:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.kpi .mv2{font-size:17px;font-weight:680;white-space:nowrap}
.kpi .mv2 small{font-size:10.5px;color:var(--mut);font-weight:400}
.inp{margin-bottom:13px}
.inp label{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:5px}
.inp label b{color:var(--txt);font-weight:600}
.inp input[type=range]{width:100%;accent-color:var(--acc);height:4px}
.charts{display:grid;grid-template-columns:repeat(auto-fit,minmax(370px,1fr));gap:16px}
.chart{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:8px;height:330px}
.chart.tall{height:430px}
table{width:100%;border-collapse:collapse;font-size:12.5px}
th,td{padding:7px 9px;text-align:right;border-bottom:1px solid var(--line)}
th:first-child,td:first-child{text-align:left}
thead th{color:var(--mut);font-weight:600;text-transform:uppercase;font-size:10.5px;letter-spacing:.4px}
.tot td{font-weight:700;border-top:2px solid var(--line);background:var(--panel2)}
.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10.5px;font-weight:600}
.fix{background:rgba(57,217,138,.14);color:var(--grn);border:1px solid rgba(57,217,138,.3)}
.warn{background:rgba(255,107,107,.12);color:var(--red);border:1px solid rgba(255,107,107,.3);padding:10px 12px;border-radius:8px;font-size:12.5px;margin-top:10px}
.info{background:rgba(74,168,255,.10);color:#a9d3ff;border:1px solid rgba(74,168,255,.28);padding:10px 12px;border-radius:8px;font-size:12.5px;margin-top:10px}
.ladder{display:flex;flex-direction:column;gap:6px}
.rung{display:flex;justify-content:space-between;padding:9px 14px;border-radius:8px;background:linear-gradient(90deg,var(--panel2),var(--panel));border:1px solid var(--line)}
.rung b{color:var(--acc)}
.muted{color:var(--mut);font-size:12px}
footer{padding:16px 22px;color:var(--mut);font-size:11px;border-top:1px solid var(--line);margin-top:20px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:10px;flex-wrap:wrap}
.seg button{background:var(--panel2);border:none;color:var(--mut);padding:6px 11px;cursor:pointer;font-size:12px}
.seg button.on{background:var(--acc);color:#04120f;font-weight:600}
</style>

function computeBattery(b){

 // arbitrage from the real daily wholesale curve: charge the cheapest hours, discharge the priciest, full RTE on the way out.
 // As duration rises you buy/sell over more hours, so the captured spread shrinks (that is why longer duration lowers the return).
 const ph=(PRICES.per_year[b.priceYear]||PRICES.per_year['2025']).ph;
 const nCh=Math.min(12,Math.max(0,Math.round(b.durationH*b.cyclesDay)));

 const deliv=nCh*b.powerMW*b.rte;                                // MWh delivered per day
 const capturedSpread=deliv>0?dayArb/deliv:0;                    // effective €/MWh (declines with duration)
 const avgBuy=nCh>0?sumBuy/nCh:0, avgSell=nCh>0?sumSell/nCh:0;

 const totalRev=arbRev+ancRev;

 return{energy,usable,cellCapex,icx,sub,inter,capex,perKW,opex,arbRev,ancRev,totalRev,gridCap,gridEng,gridFee,thru,energy10,capturedSpread,avgBuy,avgSell,nCh};
}
function batteryDay(){

 const sc=[...Array(24)].map((_,h)=>avg(PROFILES.solarMonthHour.map(r=>r[h])));
 let soc=energyMWh*0.5; const res=[],act=[],socP=[],col=[],txt=[];
 for(let h=0;h<24;h++){
   const gen=M.wind.mw*wc[h]+M.solar.mw*sc[h]; res.push(gen); const net=gen-load; let a=0;
   if(net>0){const room=(energyMWh-soc)/rt; a=Math.min(net,powMW,room); soc+=a*rt; act.push(a); col.push('#39d98a'); txt.push('Charging');}
   else{const avail=soc*rt; const d=Math.min(-net,powMW,avail); soc-=d/rt; a=-d; act.push(a); col.push('#ff6b6b'); txt.push('Discharging');}

function computeBatteryFin(){
 const b=M.battery,B=computeBattery(b),mac=M.macro,allIn=(b.debtRate||mac.allInRate),g=(b.gearing!=null?b.gearing:mac.gearing),gy=b.gridYear,comp=b.compression,infl=mac.infl,bdeg=b.degr;

 for(let y=Y0;y<=YN;y++){
  let rev=0,opex=0,int=0,t=0,repay=0,fcfe=0;
  if(y===COD){const draw=g*capex;bal=draw;fcfe=-capex+draw;}
  else if(y>gy-1&&y<endY&&bal>=0){
   const k=y-gy;
   rev=(B.arbRev*Math.pow(1-bdeg,k)+B.ancRev)*Math.pow(1-comp,k)*Math.pow(1+infl,k);
   opex=(B.opex+B.gridFee)*Math.pow(1+infl,y-2023);

   const dep=(y>=gy&&y<gy+depY)?capex/depY:0; const ebt=rev-opex-dep-int; let tb=ebt+nol; if(tb>0){t=tb*mac.tax;nol=0;}else{nol=tb;}
   repay=(y<gy+btenor)?Math.min(bal,ppy):0; bal-=repay; fcfe=rev-opex-t-repay-int;
  }
  rows.push({y,rev,fcfe});
 }
 const irr=xirr(rows.map(r=>r.fcfe),rows.map(r=>r.y+0.99));

}
